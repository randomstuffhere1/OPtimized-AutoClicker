name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v2.1.2)'
        required: true
      create_release:
        description: 'Create GitHub release'
        required: true
        type: boolean

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Copy executable to root
        run: copy target\release\rust_autoclicker.exe .

      - name: Create release directory
        run: mkdir release

      - name: Copy files to release directory
        run: |
          copy rust_autoclicker.exe release\
          copy icon.ico release\
          copy README.md release\

      - name: Create zip archive
        run: |
          cd release
          powershell -Command "Compress-Archive -Path * -DestinationPath ../rust-autoclicker-${{ github.event.inputs.version }}-windows.zip -Force"

      - name: Clean up target directory
        run: cargo clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-autoclicker-windows-${{ github.event.inputs.version }}
          path: |
            rust-autoclicker-${{ github.event.inputs.version }}-windows.zip
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: |
            rust-autoclicker-${{ github.event.inputs.version }}-windows.zip
          body: |
            ## Release ${{ github.event.inputs.version }}
            
            ### Download
            - **Windows**: `rust-autoclicker-${{ github.event.inputs.version }}-windows.zip`
            
            ### Installation
            1. Download the zip file for your platform
            2. Extract the archive
            3. Run `rust_autoclicker.exe`
            
            See README.md for detailed usage instructions.

            *This release was automatically generated by GitHub Actions.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
